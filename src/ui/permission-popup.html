<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Continuum</title>
<style>
  /* Mirrors panel.css's palette ("ink on warm paper") with a dark variant so the
     popup matches Continuum's look in either OS theme. */
  :root {
    --paper: #fcfcfd; --ink: #1f2937; --ink-2: #4b5563; --ink-3: #6b7280;
    --line: #e5e7eb; --accent: #3730a3; --accent-hover: #2e2885; --ok: #059669;
    --radius: 8px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #1b1d24; --ink: #e7e9ee; --ink-2: #b4b8c2; --ink-3: #868c99;
      --line: #2c2f3a; --accent: #8b84f0; --accent-hover: #9b95f3; --ok: #34d399;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 300px; padding: 16px; background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 13px; line-height: 1.5;
  }
  .head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .head img { width: 22px; height: 22px; border-radius: 6px; display: block; }
  .title { font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }
  p { margin: 0 0 14px; color: var(--ink-2); }
  button {
    width: 100%; padding: 10px 12px; border: 0; border-radius: var(--radius);
    background: var(--accent); color: #fff; font-family: var(--sans);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: background 140ms ease;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.6; cursor: default; }
  .status { margin-top: 12px; font-family: var(--mono); font-size: 12px; color: var(--ink-3); min-height: 16px; }
  .status.ok { color: var(--ok); }
  .hint { margin-top: 8px; font-size: 11px; color: var(--ink-3); }
</style>
</head>
<body>
  <div class="head">
    <img src="../../icons/icon48.png" alt="" />
    <div class="title">Continuum</div>
  </div>
  <p id="lede">Enable Continuum on your AI chat sites so it can capture and resume your conversations.</p>
  <button id="enable">Enable on all sites</button>
  <div class="status" id="status"></div>
  <div class="hint" id="hint" hidden>Then reload any open chat tabs to activate.</div>
  <script src="permission-popup.js"></script>
</body>
</html>
